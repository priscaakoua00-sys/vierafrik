<!doctype html>
<html lang="fr" style="background:#010306;">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Theme & App -->
    <meta name="theme-color" content="#010306" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <meta name="apple-mobile-web-app-title" content="VierAfrik" />

    <!-- SEO -->
    <title>VierAfrik — Gestion Business Africain</title>
    <meta name="description" content="Application de gestion pour entrepreneurs africains. Factures PDF, clients, Mobile Money, Coach IA." />
    <meta name="keywords" content="gestion business afrique, facturation, mobile money, entrepreneur africain" />

    <!-- Open Graph -->
    <meta property="og:title" content="VierAfrik — Gestion Business Africain" />
    <meta property="og:description" content="Gérez votre business africain avec factures PDF, Mobile Money, Coach IA." />
    <meta property="og:url" content="https://vierafrik.com" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="VierAfrik" />
    <!-- FIX — sans og:image, aucun logo/aperçu n'apparaît quand le lien est partagé
         (WhatsApp, Facebook, résultats Google) ou dans l'onglet du navigateur. -->
    <meta property="og:image" content="https://vierafrik.com/icon-512x512.png" />
    <meta property="og:image:width" content="512" />
    <meta property="og:image:height" content="512" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="VierAfrik — Gestion Business Africain" />
    <meta name="twitter:description" content="Gérez votre business africain avec factures PDF, Mobile Money, Coach IA." />
    <meta name="twitter:image" content="https://vierafrik.com/icon-512x512.png" />

    <!-- Apple Touch Icons -->
    <!-- FIX — icon-96x96.png et icon-72x72.png n'existent pas dans /public,
         ce qui cassait le favicon (aucun logo dans l'onglet du navigateur). -->
    <link rel="apple-touch-icon" sizes="192x192" href="/icon-192x192.png" />
    <link rel="apple-touch-icon" sizes="512x512" href="/icon-512x512.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192x192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icon-512x512.png" />
    <link rel="shortcut icon" href="/icon-192x192.png" />

    <!-- Fix fond blanc -->
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html { background: #010306; }
      body {
        background: #010306 !important;
        min-height: 100vh;
        min-height: 100dvh;
        width: 100%;
        overflow-x: hidden;
        margin: 0;
        padding: 0;
      }
      #root {
        background: #010306;
        min-height: 100vh;
        min-height: 100dvh;
        width: 100%;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <!-- Service Worker Registration -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('SW registered'))
            .catch(err => console.log('SW error:', err));
        });
      }
    </script>
  </body>
</html>
